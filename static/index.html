<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agentignore Generator</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --border: #d8dee4;
      --border-dark: #afb8c1;
      --button: #24292f;
      --button-hover: #111827;
      --soft: #f1f5f9;
      --error: #c62828;
      --focus: rgba(37, 99, 235, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    .page {
      width: min(920px, calc(100% - 32px));
      margin: 42px auto;
    }

    header {
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .section {
      padding: 22px;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child {
      border-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 650;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input {
      height: 44px;
      padding: 0 12px;
    }

    input:focus,
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px var(--focus);
    }

    button {
      height: 44px;
      border: 1px solid var(--button);
      border-radius: 8px;
      padding: 0 15px;
      background: var(--button);
      color: #fff;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--border-dark);
    }

    .secondary:hover {
      background: var(--soft);
    }

    .hint,
    .status,
    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .hint {
      margin-top: 8px;
    }

    .status {
      min-height: 20px;
      margin-top: 10px;
    }

    .status.error {
      color: var(--error);
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .actions button {
      height: 38px;
      padding: 0 12px;
    }

    textarea {
      min-height: 340px;
      padding: 14px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      line-height: 1.55;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 920px);
        margin: 18px auto;
      }

      .section {
        padding: 16px;
      }

      .input-row,
      .result-head {
        display: block;
      }

      button {
        width: 100%;
        margin-top: 10px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        margin-top: 10px;
      }

      .actions button {
        margin-top: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Agentignore Generator</h1>
      <p class="subtitle">Paste a GitHub repo URL. Get a clean .agentignore file.</p>
    </header>

    <div class="card">
      <section class="section">
        <form id="form">
          <label for="repo">Repository URL</label>
          <div class="input-row">
            <input id="repo" type="url" placeholder="https://github.com/owner/repo" required>
            <button id="generate" type="submit">Generate</button>
          </div>
          <div class="hint">Use the served app URL, not by opening this HTML file directly.</div>
          <div id="status" class="status"></div>
        </form>
      </section>

      <section class="section">
        <div class="result-head">
          <div>
            <h2>Generated .agentignore</h2>
            <div id="meta" class="meta">Nothing generated yet.</div>
          </div>
          <div class="actions">
            <button id="copy" class="secondary" type="button" disabled>Copy</button>
            <button id="download" class="secondary" type="button" disabled>Download</button>
          </div>
        </div>

        <textarea id="output" placeholder="Generated output will appear here." spellcheck="false"></textarea>
      </section>
    </div>

    <div class="footer-note">Runs locally with FastAPI.</div>
  </main>

  <script>
    var form = document.getElementById("form");
    var repo = document.getElementById("repo");
    var generate = document.getElementById("generate");
    var statusBox = document.getElementById("status");
    var output = document.getElementById("output");
    var copy = document.getElementById("copy");
    var download = document.getElementById("download");
    var meta = document.getElementById("meta");

    function setStatus(text, error) {
      statusBox.textContent = text;
      statusBox.className = error ? "status error" : "status";
    }

    function setButtons(enabled) {
      copy.disabled = !enabled;
      download.disabled = !enabled;
    }

    function updateMeta(text) {
      var clean = text.trim();
      if (!clean) {
        meta.textContent = "Nothing generated yet.";
        return;
      }

      var count = clean.split(/\r?\n/).length;
      meta.textContent = count + " " + (count === 1 ? "entry" : "entries");
    }

    if (window.location.protocol === "file:") {
      setStatus("Run the FastAPI server and open http://127.0.0.1:8000/. file:// cannot call /generate.", true);
    }

    form.onsubmit = function (event) {
      event.preventDefault();

      if (window.location.protocol === "file:") {
        setStatus("Open http://127.0.0.1:8000/ after starting the server.", true);
        return;
      }

      generate.disabled = true;
      setButtons(false);
      setStatus("Generating...");

      fetch("/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          repo_url: repo.value.trim()
        })
      })
        .then(function (response) {
          if (!response.ok) {
            return response.text().then(function (text) {
              throw new Error(text || "Could not generate file.");
            });
          }
          return response.text();
        })
        .then(function (text) {
          output.value = text;
          updateMeta(text);
          setButtons(!!text.trim());
          setStatus(text.trim() ? "Done." : "Done. No ignore entries found.");
        })
        .catch(function (error) {
          setStatus(error.message || "Something went wrong.", true);
        })
        .finally(function () {
          generate.disabled = false;
        });
    };

    copy.onclick = function () {
      output.select();
      document.execCommand("copy");
      setStatus("Copied.");
    };

    download.onclick = function () {
      var blob = new Blob([output.value + "\n"], { type: "text/plain" });
      var url = URL.createObjectURL(blob);
      var link = document.createElement("a");

      link.href = url;
      link.download = ".agentignore";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    };
  </script>
</body>
</html>
